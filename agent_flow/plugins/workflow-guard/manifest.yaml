api_version: 1
name: workflow-guard
version: 1.0.0
description: Enforce search-before-execute and reflection reminders via plugin hooks
namespace: workflow-guard
commands: []
hooks:
  - path: hooks/plugin-search-tracker.py
    event: PostToolUse
    matcher: "*"
  - path: hooks/plugin-search-before-execute.py
    event: PreToolUse
    matcher: "*"
  - path: hooks/plugin-reflection-reminder.py
    event: UserPromptSubmit
    matcher: "*"
